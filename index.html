<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人網站 | MVP</title>
    <style>
        /* --- CSS 樣式 (裝潢) --- */
        :root {
            --bg-primary: #0f172a;    /* 深藍背景 */
            --bg-secondary: #1e293b;  /* 區塊背景 */
            --accent: #38bdf8;        /* 科技藍強調色 */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            scroll-behavior: smooth; /* 讓捲動變順滑 */
        }

        /* 導覽列骨架 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Hero 區塊骨架 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 20px;
        }

        .hero span {
            color: var(--accent);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 30px;
        }

        /* 按鈕骨架 */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--bg-primary);
        }

        .btn-secondary {
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        /* 內容區塊通用骨架 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        section h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        section h2::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: var(--bg-secondary);
        }

        .content-box {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 聯絡區塊骨架 */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .contact-card {
            background: var(--bg-primary);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .contact-card:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
        }

        /* 手機版適應 */
        @media (max-width: 600px) {
            nav { padding: 15px 5%; }
            .nav-links { display: none; } /* 手機版先隱藏複雜導覽 */
            .btn-group { flex-direction: column; width: 100%; }
            .btn { text-align: center; }
        }
    </style>
</head>
<body>
<body>

    <nav>
        <div style="font-weight: bold; font-size: 1.2rem;">PORTFOLIO</div>
        <ul class="nav-links">
            <li><a href="#home">首頁</a></li>
            <li><a href="#projects">專案作品</a></li>
            <li><a href="#skills">專業技能</a></li>
            <li><a href="#contact">聯絡我</a></li>
        </ul>
    </nav>

    <header id="home" class="hero">
        <h1>你好，我是 <span>呂岳展</span></h1>
        <p>正在學習網頁開發的初學者，熱愛挑戰黑客松，將創意轉化為現實。</p>
        <div class="btn-group">
            <a href="#projects" class="btn btn-primary">查看作品</a>
            <a href="#contact" class="btn btn-secondary">聯絡我</a>
        </div>
    </header>

    <div class="container">
        <section id="projects">
            <h2>Projects</h2>
            <div class="content-box">
                <h3 style="color: var(--accent); margin-bottom: 10px;">黑客松參賽專案</h3>
                <p>參加黑客松挑戰，與團隊在限時內開發創新解決方案，鍛鍊解決問題的能力。</p>
            </div>
        </section>

        <section id="skills" style="margin-top: 50px;">
            <h2>Skills</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <span style="background: var(--bg-secondary); padding: 8px 20px; border-radius: 20px; border: 1px solid var(--accent);">Python</span>
                <span style="background: var(--bg-secondary); padding: 8px 20px; border-radius: 20px; border: 1px solid var(--accent);">HTML / CSS</span>
                <span style="background: var(--bg-secondary); padding: 8px 20px; border-radius: 20px; border: 1px solid var(--accent);">網頁程式設計</span>
            </div>
        </section>

        <section id="contact" style="margin-top: 50px;">
            <h2>Contact</h2>
            <div class="content-box">
                <p>歡迎透過以下管道聯繫我：</p>
                <div class="contact-grid">
                    <a href="mailto:your-email@example.com" class="contact-card">Email</a>
                    <a href="https://github.com" target="_blank" class="contact-card">GitHub</a>
                </div>
            </div>
        </section>
    </div>

    <footer style="text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.8rem;">
        &copy; 2026 呂岳展. Built with Vibe Coding.
    </footer>

</body>
</body>
</html>
